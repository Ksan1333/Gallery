<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620" role="img" aria-labelledby="title">
  <title id="title">XダウンロードUIモック</title>
  <style>.bg{fill:#101014}.phone{fill:#050505;stroke:#334155;stroke-width:3}.bar{fill:#000}.card{fill:#1f2937}.field{fill:#111827;stroke:#475569}.cyan{fill:#22d3ee}.txt{font:600 18px system-ui,sans-serif;fill:#f8fafc}.small{font:500 14px system-ui,sans-serif;fill:#cbd5e1}.num{font:700 16px system-ui,sans-serif;fill:#0f172a}</style>
  <rect class="bg" width="960" height="620"/>
  <rect class="phone" x="48" y="36" width="360" height="548" rx="28"/>
  <rect class="bar" x="48" y="36" width="360" height="58" rx="28"/><text class="txt" x="126" y="72">X Downloader</text><text class="txt" x="74" y="72">☰</text><circle class="cyan" cx="92" cy="55" r="12"/><text class="num" x="87" y="61">1</text>
  <rect class="field" x="76" y="122" width="280" height="54" rx="9"/><text class="small" x="94" y="155">https://x.com/.../status/...</text><circle class="cyan" cx="352" cy="122" r="12"/><text class="num" x="347" y="128">2</text>
  <rect x="96" y="194" width="240" height="46" rx="18" fill="#0e7490"/><text class="txt" x="130" y="224">Show download options</text><circle class="cyan" cx="326" cy="194" r="12"/><text class="num" x="321" y="200">3</text>
  <rect class="card" x="76" y="270" width="280" height="76" rx="10"/><text class="small" x="96" y="302">History: completed.mp4</text><text class="small" x="96" y="326">COMPLETED  24MB  ▶ preview</text><circle class="cyan" cx="350" cy="274" r="12"/><text class="num" x="345" y="280">4</text>
  <rect class="card" x="92" y="384" width="248" height="144" rx="16" stroke="#22d3ee"/><text class="txt" x="122" y="420">Download options</text><text class="small" x="122" y="454">○ High   ○ Medium   ○ Low</text><text class="small" x="122" y="486">GIF source: Download GIF</text><text class="small" x="122" y="514">Start download   HOME   Cancel</text><circle class="cyan" cx="332" cy="388" r="12"/><text class="num" x="327" y="394">5</text>
  <text class="txt" x="470" y="76">画面説明</text>
  <text class="small" x="470" y="122">1. メニュー。共有起動時もこの画面に着地する。</text>
  <text class="small" x="470" y="158">2. 共有URL、クリップボード、手入力URLを表示。</text>
  <text class="small" x="470" y="194">3. URLを解析し、保存候補を表示する。</text>
  <text class="small" x="470" y="230">4. 保存履歴。タップでアプリ内プレビュー。</text>
  <text class="small" x="470" y="266">5. 品質/GIF選択、開始、HOME、キャンセル。</text>
</svg>
