="144" class="numText" text-anchor="middle">1</text><text x="534" y="134" class="callTitle">トップバー</text><text x="534" y="158" class="callBody">検索、列数、フィルタ/並び替えをホーム画面から直接操作します。</text><line x1="166" y1="220" x2="506" y2="204" class="line"/><circle cx="506" cy="204" r="12" class="num"/><text x="506" y="208" class="numText" text-anchor="middle">2</text><text x="534" y="198" class="callTitle">日別ヘッダー</text><text x="534" y="222" class="callBody">日/月/年/ストレージ単位のグルーピング見出しをグリッド内に挿入します。</text><line x1="246" y1="356" x2="506" y2="268" class="line"/><circle cx="506" cy="268" r="12" class="num"/><text x="506" y="272" class="numText" text-anchor="middle">3</text><text x="534" y="262" class="callTitle">メディアセル</text><text x="534" y="286" class="callBody">画像、GIF、動画バッジ、お気に入り状態を同じタイルで扱います。</text><line x1="366" y1="340" x2="506" y2="332" class="line"/><circle cx="506" cy="332" r="12" class="num"/><text x="506" y="336" class="numText" text-anchor="middle">4</text><text x="534" y="326" class="callTitle">スクロールバー位置ラベル</text><text x="534" y="350" class="callBody">バー操作中は左側に現在位置の年月を表示します。</text><line x1="196" y1="664" x2="506" y2="396" class="line"/><circle cx="506" cy="396" r="12" class="num"/><text x="506" y="400" class="numText" text-anchor="middle">5</text><text x="534" y="390" class="callTitle">選択モード</text><text x="534" y="414" class="callBody">複数選択中は一括移動、タグ編集、削除などの操作を表示します。</text></svg>
