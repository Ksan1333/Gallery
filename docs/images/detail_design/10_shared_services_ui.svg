><line x1="166" y1="228" x2="506" y2="140" class="line"/><circle cx="506" cy="140" r="12" class="num"/><text x="506" y="144" class="numText" text-anchor="middle">1</text><text x="534" y="134" class="callTitle">ナビゲーションドロワー</text><text x="534" y="158" class="callBody">主要画面、開発中機能、ガイド、アプリ情報へ移動します。</text><line x1="326" y1="208" x2="506" y2="204" class="line"/><circle cx="506" cy="204" r="12" class="num"/><text x="506" y="208" class="numText" text-anchor="middle">2</text><text x="534" y="198" class="callTitle">起動タスク</text><text x="534" y="222" class="callBody">MediaStore同期、サムネイル生成、モデル準備を共通サービスで実行します。</text><line x1="322" y1="396" x2="506" y2="268" class="line"/><circle cx="506" cy="268" r="12" class="num"/><text x="506" y="272" class="numText" text-anchor="middle">3</text><text x="534" y="262" class="callTitle">Room / Repository</text><text x="534" y="286" class="callBody">メディアメタデータ、タグ、履歴、参照資料を永続化します。</text><line x1="326" y1="540" x2="506" y2="332" class="line"/><circle cx="506" cy="332" r="12" class="num"/><text x="506" y="336" class="numText" text-anchor="middle">4</text><text x="534" y="326" class="callTitle">グローバル進捗</text><text x="534" y="350" class="callBody">AI解析や一括処理の進行状況をアプリ全体で共有します。</text></svg>
