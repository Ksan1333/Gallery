  <rect class="card" x="76" y="380" width="130" height="110" rx="10"/><text class="small" x="98" y="438">資料画像</text><rect class="card" x="226" y="380" width="130" height="110" rx="10"/><text class="small" x="244" y="438">URL資料</text><circle class="cyan" cx="358" cy="384" r="12"/><text class="num" x="353" y="390">5</text>
