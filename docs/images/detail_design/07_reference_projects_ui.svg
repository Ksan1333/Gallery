  <rect class="card" x="76" y="206" width="280" height="66" rx="10"/><text class="small" x="98" y="236">✓ 背景練習  FINISHED</text><text class="small" x="98" y="258">資料 9件   🗑</text><circle class="cyan" cx="356" cy="126" r="12"/><text class="num" x="351" y="132">2</text>
  <circle class="cyan" cx="340" cy="514" r="28"/><text class="num" x="335" y="520">3</text>
