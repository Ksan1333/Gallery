<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Gallery feature map</title>
  <desc id="desc">Feature overview for the Gallery Android app</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#1f2937"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .title { font: 700 44px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f8fafc; }
      .subtitle { font: 500 20px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #cbd5e1; }
      .card-title { font: 700 24px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f8fafc; }
      .card-text { font: 500 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #d1d5db; }
      .chip { font: 700 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    </style>
  </defs>
  <rect width="1200" height="680" rx="0" fill="url(#bg)"/>
  <text x="60" y="72" class="title">Gallery</text>
  <text x="60" y="108" class="subtitle">大量メディア閲覧、AI分析、制作資料、漫画、X保存をまとめる個人向けギャラリー</text>

  <g filter="url(#shadow)">
    <rect x="60" y="155" width="330" height="150" rx="18" fill="#0f766e"/>
    <text x="90" y="205" class="card-title">メディア一覧</text>
    <text x="90" y="238" class="card-text">画像 / GIF / 動画を高速グリッド表示</text>
    <text x="90" y="266" class="card-text">日・月・年・ストレージで俯瞰</text>

    <rect x="435" y="155" width="330" height="150" rx="18" fill="#2563eb"/>
    <text x="465" y="205" class="card-title">ビューア</text>
    <text x="465" y="238" class="card-text">ズーム、スワイプ、動画再生</text>
    <text x="465" y="266" class="card-text">壁紙、フレーム保存、関連表示</text>

    <rect x="810" y="155" width="330" height="150" rx="18" fill="#7c3aed"/>
    <text x="840" y="205" class="card-title">AI分析</text>
    <text x="840" y="238" class="card-text">タグ、年齢制限、画像ベクトル</text>
    <text x="840" y="266" class="card-text">未分析メディアをまとめて処理</text>

    <rect x="60" y="345" width="330" height="150" rx="18" fill="#c2410c"/>
    <text x="90" y="395" class="card-title">X / Twitter 保存</text>
    <text x="90" y="428" class="card-text">共有、URL、クリップボードから保存</text>
    <text x="90" y="456" class="card-text">動画 / 画像 / GIF を履歴管理</text>

    <rect x="435" y="345" width="330" height="150" rx="18" fill="#be123c"/>
    <text x="465" y="395" class="card-title">お絵描き資料</text>
    <text x="465" y="428" class="card-text">制作中の参考画像を一時収集</text>
    <text x="465" y="456" class="card-text">検索、長押し追加、スクショ保存</text>

    <rect x="810" y="345" width="330" height="150" rx="18" fill="#9333ea"/>
    <text x="840" y="395" class="card-title">漫画ビューア</text>
    <text x="840" y="428" class="card-text">ZIP / PDF をページ単位で閲覧</text>
    <text x="840" y="456" class="card-text">見開き、しおり、スクショ保存</text>
  </g>

  <g>
    <rect x="60" y="555" width="170" height="42" rx="21" fill="#f8fafc"/>
    <text x="93" y="582" class="chip">Room DB</text>
    <rect x="250" y="555" width="170" height="42" rx="21" fill="#f8fafc"/>
    <text x="284" y="582" class="chip">MediaStore</text>
    <rect x="440" y="555" width="170" height="42" rx="21" fill="#f8fafc"/>
    <text x="486" y="582" class="chip">Coil</text>
    <rect x="630" y="555" width="170" height="42" rx="21" fill="#f8fafc"/>
    <text x="658" y="582" class="chip">ExoPlayer</text>
    <rect x="820" y="555" width="170" height="42" rx="21" fill="#f8fafc"/>
    <text x="865" y="582" class="chip">ONNX</text>
    <rect x="1010" y="555" width="130" height="42" rx="21" fill="#f8fafc"/>
    <text x="1040" y="582" class="chip">Compose</text>
  </g>
</svg>
